packages:
  - 'xer-blog'
  - 'xer-landing'
  - 'xer-docs'

# Build scripts approved to run during install (consolidated from xer-blog).
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true

minimumReleaseAgeExclude:
  - '@cloudflare/workerd-darwin-64@1.20260609.1'
  - '@cloudflare/workerd-darwin-arm64@1.20260609.1'
  - '@cloudflare/workerd-linux-64@1.20260609.1'
  - '@cloudflare/workerd-linux-arm64@1.20260609.1'
  - '@cloudflare/workerd-windows-64@1.20260609.1'
  - miniflare@4.20260609.0
  - workerd@1.20260609.1
  - wrangler@4.99.0
  - astro@6.4.5
  - '@astrojs/starlight@0.40.0'
  - '@expressive-code/core@0.43.1'
  - '@expressive-code/plugin-frames@0.43.1'
  - '@expressive-code/plugin-shiki@0.43.1'
  - '@expressive-code/plugin-text-markers@0.43.1'
  - astro-expressive-code@0.43.1
  - expressive-code@0.43.1
  - rehype-expressive-code@0.43.1
